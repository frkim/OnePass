# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: onepass
metadata:
  template: onepass@0.2.0
services:
  app:
    project: src/OnePass.Api
    language: dotnet
    host: appservice
    # The API project's MSBuild also runs `npm run build` (defined in OnePass.Api.csproj)
    # which writes the SPA into src/OnePass.Api/wwwroot, so a single publish bundles both.
