name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api:
    name: API (build + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/OnePass.sln

      - name: Build (Release)
        # Skip the SPA bundling target — the API project compiles on its own here.
        run: dotnet build src/OnePass.sln --configuration Release --no-restore -p:SkipSpaBuild=true

      - name: Unit tests
        run: dotnet test src/OnePass.Api.Tests/OnePass.Api.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=api-tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: '**/TestResults/*.trx'

  web:
    name: Web (build + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/OnePass.Web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/OnePass.Web/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests (vitest)
        run: npm test

      - name: Build (production bundle)
        run: npm run build

      - name: Upload SPA bundle
        uses: actions/upload-artifact@v4
        with:
          name: spa-dist
          path: src/OnePass.Api/wwwroot

  e2e:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install SPA deps
        working-directory: src/OnePass.Web
        run: npm ci

      - name: Build SPA into wwwroot
        working-directory: src/OnePass.Web
        run: npm run build

      - name: Start API in background
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:5248
          # Phase 0 of the SaaS migration removed the hardcoded seed admin
          # password. Pin it here so the Playwright suite (which uses the
          # well-known E2E_ADMIN_PASSWORD default) can sign in.
          Bootstrap__SeedDefaultAdmin: 'true'
          Bootstrap__DefaultAdminPassword: 'Devoxx2026!'
        run: |
          nohup dotnet run --project src/OnePass.Api/OnePass.Api.csproj -p:SkipSpaBuild=true --configuration Release > api.log 2>&1 &
          echo "Waiting for API to become ready..."
          for i in {1..60}; do
            if curl -fsS http://localhost:5248/health > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to become ready"
          cat api.log
          exit 1

      - name: Install Playwright deps
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: tests/e2e
        env:
          BASE_URL: http://localhost:5248
        run: npx playwright test --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report

      - name: Upload API log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: api.log
