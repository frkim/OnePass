name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # Required for federated OIDC login to Azure
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: azd up (provision + deploy)
    runs-on: ubuntu-latest
    environment: production
    env:
      # These come from repository/environment secrets or variables.
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'onepass-prod' }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'swedencentral' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/OnePass.Web/package-lock.json

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Build SPA bundle into wwwroot
        # Pre-build the SPA so the implicit `Content` glob in OnePass.Api.csproj
        # picks up wwwroot files at publish time. Avoids needing the MSBuild
        # `BuildSpa` target on the runner during `azd up`.
        working-directory: src/OnePass.Web
        run: |
          npm ci
          npm run build

      - name: Azure login (OIDC)
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider "github" \
            --tenant-id "$AZURE_TENANT_ID"

      - name: Provision & deploy (azd up)
        run: azd up --no-prompt
        env:
          AZD_NON_INTERACTIVE: 'true'

      - name: Smoke test deployed app
        run: |
          endpoint=$(azd env get-values | grep SERVICE_APP_ENDPOINT_URL | cut -d'=' -f2 | tr -d '"')
          echo "Probing $endpoint/health"
          for i in {1..30}; do
            if curl -fsS "$endpoint/health" > /dev/null; then
              echo "OK"
              exit 0
            fi
            sleep 5
          done
          echo "Health probe timed out"
          exit 1
